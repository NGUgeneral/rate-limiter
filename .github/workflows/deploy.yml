name: Deploy to AWS Lambda

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux Dependencies
        run: |
          mkdir build
          pip install --platform manylinux2014_x86_64 --target ./build --implementation cp --python-version 3.11 --only-binary=:all: -r requirements.txt
          cp main.py ./build/
          cp rate_limiter.lua ./build/

      - name: Create Zip Package
        run: |
          cd build
          zip -r ../deployment_package.zip .
          cd ..

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Deploy Binary to Lambda
        run: |
          aws lambda update-function-code \
            --function-name rate-limiter \
            --zip-file fileb://deployment_package.zip