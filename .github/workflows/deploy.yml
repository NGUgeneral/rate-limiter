name: Continuous Integration (Rate Limiter)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Build Verification & Unit Tests
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down the clean Python source code from your repo
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up native Python 3.12 runner environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    # 3. Verify standard requirements install cleanly without resolution conflicts
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # If you have your pytest suite ready, uncomment below:
        # pip install pytest && pytest

    # 4. Verify that your cloud-agnostic Dockerfile builds smoothly 
    - name: Test Local Docker Build
      if: false # disable deployment
      run: |
        docker build -t flagship-rate-limiter:test .
